# Awale Model Configuration

[model]
input_dim = 48
encoding_shape = [4, 12]

[[model.layers.shared]]
type = "Dense"
in = 48
out = 128
activation = "relu"

[[model.layers.shared]]
type = "Dense"
in = 128
out = 128
activation = "relu"

[[model.layers.policy]]
type = "Dense"
in = 128
out = 64
activation = "relu"

[[model.layers.policy]]
type = "Dense"
in = 64
out = 6
activation = "identity"

[[model.layers.value]]
type = "Dense"
in = 128
out = 1
activation = "tanh"
